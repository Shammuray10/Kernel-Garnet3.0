name: 🔥 Wild Kernel — Garnet (android12-5.10)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Versión del kernel (ej: 5.10.236)"
        required: false
        default: "latest"
      ksu_variant:
        description: "Variante de KernelSU"
        required: true
        default: "KernelSU-Next"
        type: choice
        options:
          - KernelSU-Next
          - Wild-KSU
      susfs_version:
        description: "Versión SUSFS"
        required: true
        default: "v2.0.0"
      enable_lto:
        description: "Activar LTO Thin (mejora rendimiento ~5-10%)"
        required: true
        default: true
        type: boolean
      enable_bbr:
        description: "Activar BBR TCP congestion control"
        required: true
        default: true
        type: boolean
      enable_bbg:
        description: "Activar Baseband Guard (BBG)"
        required: true
        default: true
        type: boolean

env:
  KERNEL_BRANCH: "android12-5.10"
  KERNEL_SOURCE: "https://android.googlesource.com/kernel/common"
  ARCH: "arm64"
  SUBARCH: "arm64"
  ANYKERNEL_REPO: "https://github.com/osm0sis/AnyKernel3"
  ANYKERNEL_BRANCH: "master"

jobs:
  build:
    name: 🏗️ Compilar Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex \
            git gnupg gperf libelf-dev libncurses-dev libssl-dev \
            lz4 python3 python3-pip unzip wget zip zstd \
            ccache cpio kmod libdw-dev

      - name: 💾 Caché ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-garnet-${{ env.KERNEL_BRANCH }}-${{ github.sha }}
          restore-keys: |
            ccache-garnet-${{ env.KERNEL_BRANCH }}-

      - name: ⚙️ Configurar ccache
        run: |
          ccache --max-size=5G
          ccache --set-config=compression=true

      - name: 📦 Clonar kernel GKI android12-5.10
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: 🛠️ Descargar Clang (Android prebuilt)
        run: |
          mkdir -p toolchain

          git clone --depth=1 \
            https://gitlab.com/Matrixx-Devices/android_prebuilts_clang_host_linux-x86_clang-r487747c.git \
            toolchain/clang

          echo "CLANG_PATH=$(pwd)/toolchain/clang/bin" >> $GITHUB_ENV

          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            toolchain/gcc64

          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            toolchain/gcc32

          echo "GCC64_PATH=$(pwd)/toolchain/gcc64/bin" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/toolchain/gcc32/bin" >> $GITHUB_ENV

          toolchain/clang/bin/clang --version

      - name: 🔐 Integrar ${{ github.event.inputs.ksu_variant }}
        working-directory: kernel
        run: |
          KSU_VARIANT="${{ github.event.inputs.ksu_variant }}"
          if [ "$KSU_VARIANT" = "Wild-KSU" ]; then
            curl -LSs \
              "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" \
              | bash -s wild-susfs
          else
            curl -LSs \
              "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
              | bash -s next-susfs
          fi

      - name: 🛡️ Aplicar parche SUSFS
        working-directory: kernel
        run: |
          wget -q \
            "https://gitlab.com/simonpunk/susfs4ksu/-/raw/gki-android12-5.10/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch" \
            -O susfs.patch
          patch -p1 --forward --fuzz=3 < susfs.patch || true

      - name: 🛡️ Aplicar Baseband Guard (BBG)
        if: ${{ github.event.inputs.enable_bbg == 'true' }}
        working-directory: kernel
        run: |
          git clone --depth=1 \
            https://github.com/vc-teahouse/Baseband-guard /tmp/bbg
          if [ -f /tmp/bbg/kernel_patch/bbg.patch ]; then
            patch -p1 --forward --fuzz=3 < /tmp/bbg/kernel_patch/bbg.patch || true
          else
            echo "⚠️ bbg.patch no encontrado, saltando"
          fi

      - name: ⚡ Aplicar optimizaciones
        working-directory: kernel
        run: |
          if [ "${{ github.event.inputs.enable_bbr }}" = "true" ]; then
            scripts/config --file arch/arm64/configs/gki_defconfig \
              -e TCP_CONG_BBR -e NET_SCH_FQ
          fi

          if [ "${{ github.event.inputs.enable_lto }}" = "true" ]; then
            scripts/config --file arch/arm64/configs/gki_defconfig \
              -e LTO_CLANG -e LTO_CLANG_THIN \
              -d LTO_CLANG_FULL -d LTO_NONE
          fi

          scripts/config --file arch/arm64/configs/gki_defconfig \
            -e IOSCHED_BFQ -e BFQ_GROUP_IOSCHED \
            -e MQ_IOSCHED_KYBER \
            -e ZRAM -e CRYPTO_LZ4 -e CRYPTO_ZSTD \
            -e WIREGUARD

      - name: 🔨 Compilar kernel
        working-directory: kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:${{ env.GCC64_PATH }}:${{ env.GCC32_PATH }}:$PATH"

          LTO_SUFFIX=""
          if [ "${{ github.event.inputs.enable_lto }}" = "true" ]; then
            LTO_SUFFIX="-LTO"
          fi

          MAKE_ARGS=(
            ARCH=${{ env.ARCH }}
            SUBARCH=${{ env.SUBARCH }}
            CC="ccache clang"
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            READELF=llvm-readelf
            STRIP=llvm-strip
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
            CLANG_TRIPLE=aarch64-linux-gnu-
            LLVM=1
            LLVM_IAS=1
            LOCALVERSION="-Wild-garnet${LTO_SUFFIX}"
          )

          make "${MAKE_ARGS[@]}" gki_defconfig

          make "${MAKE_ARGS[@]}" -j$(nproc) \
            Image Image.lz4 2>&1 | tee build.log

          ls -lh arch/arm64/boot/Image*

      - name: 📦 Empaquetar AnyKernel3
        run: |
          git clone --depth=1 \
            -b ${{ env.ANYKERNEL_BRANCH }} \
            ${{ env.ANYKERNEL_REPO }} AnyKernel3

          cp kernel/arch/arm64/boot/Image AnyKernel3/

          KVER=$(cat kernel/include/generated/utsrelease.h \
            | sed 's/.*"\(.*\)".*/\1/' 2>/dev/null || echo "5.10-android12")
          DATE=$(date +%Y-%m)
          ZIP_NAME="${KVER}-${DATE}-AnyKernel3.zip"

          cat > AnyKernel3/anykernel.sh << 'AKEOF'
          properties() {
            kernel.string=Wild Kernel GKI Garnet
            do.devicecheck=0
            do.modules=0
            do.systemless=1
            do.cleanup=1
            do.cleanuponabort=0
          }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_image;
          AKEOF

          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x ".git/*" -x "*.md"
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: 📤 Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wild-Kernel-Garnet-${{ github.run_number }}
          path: "*.zip"
          retention-days: 30

      - name: 📋 Subir log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/build.log
          retention-days: 7

      - name: 📊 Resumen
        if: success()
        run: |
          echo "## ✅ Build completado" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **ZIP** | \`${{ env.ZIP_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **KSU** | ${{ github.event.inputs.ksu_variant }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **LTO Thin** | ${{ github.event.inputs.enable_lto }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **BBR** | ${{ github.event.inputs.enable_bbr }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **BBG** | ${{ github.event.inputs.enable_bbg }} |" >> $GITHUB_STEP_SUMMARY
          
