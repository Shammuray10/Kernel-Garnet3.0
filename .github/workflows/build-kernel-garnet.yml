name: 🔥 Wild Kernel — Garnet (android12-5.10)

on:
  workflow_dispatch:
    # ... (tus inputs se mantienen igual)

env:
  KERNEL_BRANCH: "android12-5.10"
  KERNEL_SOURCE: "https://android.googlesource.com/kernel/common"
  # Solución a advertencia de Node.js
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  ARCH: "arm64"
  SUBARCH: "arm64"
  ANYKERNEL_REPO: "https://github.com/osm0sis/AnyKernel3"
  ANYKERNEL_BRANCH: "master"

jobs:
  build:
    name: 🏗️ Compilar Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex \
            git gnupg gperf libelf-dev libncurses-dev libssl-dev \
            lz4 python3 python3-pip unzip wget zip zstd \
            ccache cpio kmod libdw-dev

      - name: 📦 Clonar kernel GKI (Corrección Error 128)
        run: |
          # Usamos --single-branch para evitar errores de Git 128
          git clone --depth=1 --single-branch \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel
          
          # Crear el log de antemano para evitar advertencia de artifact
          touch kernel/build.log

      - name: 🛠️ Descargar Clang (Estable 15.0.7)
        run: |
          mkdir -p toolchain/clang
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20230510/Clang-15.0.7-20230510.tar.gz"
          wget -q "$CLANG_URL" -O clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain/clang
          rm clang.tar.gz
          echo "CLANG_PATH=$(pwd)/toolchain/clang/bin" >> $GITHUB_ENV

          # Clonar GCC con flags de estabilidad
          git clone --depth=1 --single-branch \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            toolchain/gcc64
          git clone --depth=1 --single-branch \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            toolchain/gcc32

          echo "GCC64_PATH=$(pwd)/toolchain/gcc64/bin" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/toolchain/gcc32/bin" >> $GITHUB_ENV

      # ... (Pasos de parches KSU, SUSFS y BBG se mantienen igual)

      - name: 🔨 Compilar kernel
        working-directory: kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:${{ env.GCC64_PATH }}:${{ env.GCC32_PATH }}:$PATH"
          
          MAKE_ARGS=(
            ARCH=${{ env.ARCH }}
            CC="ccache clang"
            LD=ld.lld
            LLVM=1
            LLVM_IAS=1
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
            CLANG_TRIPLE=aarch64-linux-gnu-
          )

          make "${MAKE_ARGS[@]}" gki_defconfig
          # El comando tee asegura que todo se guarde en build.log
          make "${MAKE_ARGS[@]}" -j$(nproc) Image 2>&1 | tee -a build.log

      # ... (Pasos de AnyKernel3 se mantienen igual)

      - name: 📋 Subir log (Siempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/build.log
          if-no-files-found: warn
          
